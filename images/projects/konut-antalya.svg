<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Antalya Kemer Prefabrik Konut Projesi - Sıra prefabrik konut üniteleri">
  <title>Antalya Kemer Prefabrik Konut Projesi</title>
  <defs>
    <pattern id="grid-ka" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="sky-ka" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1118"/>
      <stop offset="70%" stop-color="#172030"/>
      <stop offset="100%" stop-color="#1c2a3e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky-ka)"/>
  <rect width="800" height="600" fill="url(#grid-ka)"/>

  <!-- Mountains in background -->
  <polygon points="0,340 120,200 240,340" fill="rgba(15,22,32,0.6)"/>
  <polygon points="80,340 220,160 380,340" fill="rgba(12,18,28,0.7)"/>
  <polygon points="300,340 450,190 600,340" fill="rgba(15,22,32,0.6)"/>
  <polygon points="500,340 650,220 800,340" fill="rgba(12,18,28,0.55)"/>
  <polygon points="620,340 750,240 800,280 800,340" fill="rgba(15,22,32,0.5)"/>

  <!-- Ground -->
  <rect x="0" y="490" width="800" height="110" fill="#0d1520"/>
  <line x1="0" y1="490" x2="800" y2="490" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <!-- Street/path -->
  <rect x="0" y="490" width="800" height="22" fill="#111d2a"/>
  <!-- Path edge -->
  <line x1="40" y1="505" x2="760" y2="505" stroke="rgba(234,228,212,0.06)" stroke-width="1"/>

  <!-- 4 prefab housing units in a row -->

  <!-- UNIT 1 (leftmost) -->
  <!-- Ground floor -->
  <rect x="45" y="360" width="148" height="130" fill="#1a2434" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>
  <!-- Flat roof -->
  <rect x="40" y="348" width="158" height="14" fill="#1e2c3e" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <!-- Roof railing -->
  <line x1="44" y1="345" x2="194" y2="345" stroke="rgba(234,228,212,0.3)" stroke-width="1.5"/>
  <!-- Window large -->
  <rect x="55" y="378" width="60" height="70" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <line x1="85" y1="378" x2="85" y2="448" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <line x1="55" y1="410" x2="115" y2="410" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Door -->
  <rect x="133" y="400" width="44" height="90" fill="rgba(234,228,212,0.08)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <!-- Sunshade -->
  <rect x="43" y="375" width="155" height="7" fill="#222e40" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <!-- Ground floor number -->
  <text x="82" y="480" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.2)" text-anchor="middle">U-01</text>

  <!-- UNIT 2 -->
  <rect x="210" y="355" width="148" height="135" fill="#1c2638" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>
  <rect x="205" y="343" width="158" height="14" fill="#202e42" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <!-- Second floor terrace (slightly different) -->
  <rect x="210" y="265" width="148" height="90" fill="#1a2434" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <rect x="205" y="253" width="158" height="14" fill="#1e2c3e" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <!-- Second floor railing -->
  <line x1="209" y1="250" x2="359" y2="250" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="215" y1="240" x2="215" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <line x1="255" y1="240" x2="255" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <line x1="295" y1="240" x2="295" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <line x1="335" y1="240" x2="335" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <line x1="355" y1="240" x2="355" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <!-- G/F windows -->
  <rect x="220" y="375" width="56" height="62" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <line x1="220" y1="405" x2="276" y2="405" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <rect x="296" y="378" width="48" height="55" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <rect x="220" y="275" width="120" height="60" fill="rgba(183,80,31,0.1)" stroke="rgba(234,228,212,0.4)" stroke-width="1.2"/>
  <line x1="280" y1="275" x2="280" y2="335" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <!-- Unit entrance -->
  <rect x="298" y="408" width="44" height="82" fill="rgba(234,228,212,0.08)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <text x="284" y="480" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.2)" text-anchor="middle">U-02</text>

  <!-- UNIT 3 (same layout as unit 2 but mirrored) -->
  <rect x="443" y="355" width="148" height="135" fill="#1c2638" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>
  <rect x="438" y="343" width="158" height="14" fill="#202e42" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <rect x="443" y="265" width="148" height="90" fill="#1a2434" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <rect x="438" y="253" width="158" height="14" fill="#1e2c3e" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <line x1="442" y1="250" x2="592" y2="250" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="448" y1="240" x2="448" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <line x1="488" y1="240" x2="488" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <line x1="528" y1="240" x2="528" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <line x1="568" y1="240" x2="568" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <line x1="588" y1="240" x2="588" y2="253" stroke="rgba(234,228,212,0.3)" stroke-width="1.2"/>
  <!-- G/F windows -->
  <rect x="460" y="375" width="48" height="55" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <rect x="524" y="375" width="56" height="62" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <line x1="524" y1="405" x2="580" y2="405" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <rect x="453" y="275" width="120" height="60" fill="rgba(183,80,31,0.1)" stroke="rgba(234,228,212,0.4)" stroke-width="1.2"/>
  <line x1="513" y1="275" x2="513" y2="335" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <!-- Entrance -->
  <rect x="460" y="408" width="44" height="82" fill="rgba(234,228,212,0.08)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <text x="517" y="480" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.2)" text-anchor="middle">U-03</text>

  <!-- UNIT 4 (rightmost) -->
  <rect x="607" y="360" width="148" height="130" fill="#1a2434" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>
  <rect x="602" y="348" width="158" height="14" fill="#1e2c3e" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <line x1="606" y1="345" x2="756" y2="345" stroke="rgba(234,228,212,0.3)" stroke-width="1.5"/>
  <!-- Window large -->
  <rect x="625" y="378" width="60" height="70" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <line x1="655" y1="378" x2="655" y2="448" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <line x1="625" y1="410" x2="685" y2="410" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Door -->
  <rect x="693" y="400" width="44" height="90" fill="rgba(234,228,212,0.08)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <!-- Sunshade -->
  <rect x="605" y="375" width="155" height="7" fill="#222e40" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <text x="679" y="480" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.2)" text-anchor="middle">U-04</text>

  <!-- Pathway between units -->
  <line x1="196" y1="380" x2="210" y2="490" stroke="rgba(234,228,212,0.06)" stroke-width="1"/>
  <line x1="360" y1="380" x2="443" y2="490" stroke="rgba(234,228,212,0.06)" stroke-width="1"/>
  <line x1="593" y1="380" x2="607" y2="490" stroke="rgba(234,228,212,0.06)" stroke-width="1"/>

  <!-- Trees between units -->
  <circle cx="200" cy="425" r="14" fill="rgba(14,20,30,0.8)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="197" y="425" width="6" height="65" fill="rgba(14,20,30,0.7)"/>
  <circle cx="400" cy="420" r="14" fill="rgba(14,20,30,0.8)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="397" y="420" width="6" height="70" fill="rgba(14,20,30,0.7)"/>
  <circle cx="600" cy="425" r="14" fill="rgba(14,20,30,0.8)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="597" y="425" width="6" height="65" fill="rgba(14,20,30,0.7)"/>

  <!-- Unit count label -->
  <rect x="320" y="195" width="160" height="32" fill="rgba(183,80,31,0.12)" stroke="rgba(183,80,31,0.35)" stroke-width="1"/>
  <text x="400" y="207" font-family="monospace" font-size="9" fill="rgba(183,80,31,0.7)" text-anchor="middle" letter-spacing="0.1em">28 ÜNİTE TOPLAM</text>
  <text x="400" y="220" font-family="monospace" font-size="8" fill="rgba(234,228,212,0.3)" text-anchor="middle" letter-spacing="0.06em">HAFİF ÇELİK PREFABRIK</text>

  <!-- Label -->
  <rect x="16" y="16" width="6" height="6" fill="#B7501F"/>
  <text x="28" y="24" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.85)" letter-spacing="0.12em">KONUT · PREFABRİK</text>
  <text x="16" y="40" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.08em">2023-031 / ANTALYA KEMER</text>

  <path d="M16 580 L16 564 L32 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <path d="M784 580 L784 564 L768 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
</svg>
