<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Konya OSB Üretim Tesisi - Çok açıklıklı portal çerçeveli endüstriyel üretim binası">
  <title>Konya OSB Üretim Tesisi</title>
  <defs>
    <pattern id="grid-fk" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="sky-fk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#090d12"/>
      <stop offset="100%" stop-color="#141c24"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky-fk)"/>
  <rect width="800" height="600" fill="url(#grid-fk)"/>

  <!-- Flat horizon / industrial zone context -->
  <line x1="0" y1="380" x2="800" y2="380" stroke="rgba(234,228,212,0.05)" stroke-width="1"/>
  <!-- Background buildings (distant OSB) -->
  <rect x="0" y="305" width="80" height="75" fill="rgba(14,20,30,0.4)" stroke="rgba(234,228,212,0.06)" stroke-width="1"/>
  <rect x="700" y="320" width="100" height="60" fill="rgba(14,20,30,0.4)" stroke="rgba(234,228,212,0.06)" stroke-width="1"/>
  <!-- Distant chimney -->
  <rect x="690" y="235" width="10" height="88" fill="rgba(14,20,30,0.4)" stroke="rgba(234,228,212,0.06)" stroke-width="1"/>

  <!-- Ground / concrete yard -->
  <rect x="0" y="450" width="800" height="150" fill="#0c1219"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="0" y="450" width="800" height="22" fill="#111820"/>
  <!-- Yard markings -->
  <line x1="0" y1="460" x2="800" y2="460" stroke="rgba(183,80,31,0.08)" stroke-width="1.5"/>
  <!-- Truck entrance marking -->
  <rect x="140" y="450" width="120" height="22" fill="rgba(183,80,31,0.06)"/>
  <rect x="540" y="450" width="120" height="22" fill="rgba(183,80,31,0.06)"/>

  <!-- MULTI-SPAN PRODUCTION BUILDING (3 portal frame bays side by side) -->
  <!-- This is the key distinction from single-span factory — multiple parallel bays -->

  <!-- ===== BAY 1 (leftmost) ===== -->
  <!-- Walls -->
  <rect x="55" y="260" width="30" height="190" fill="#161e2a" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <!-- Gabled roof -->
  <polygon points="55,260 245,210 245,260 55,260" fill="#101820" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>
  <!-- Rafter lines -->
  <line x1="115" y1="247" x2="245" y2="210" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="175" y1="233" x2="245" y2="210" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <!-- Ridge -->
  <line x1="55" y1="260" x2="245" y2="210" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <!-- Back wall -->
  <rect x="55" y="260" width="190" height="190" fill="#141c28" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <!-- Windows Bay 1 -->
  <rect x="70" y="290" width="50" height="38" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>
  <line x1="95" y1="290" x2="95" y2="328" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <rect x="135" y="290" width="50" height="38" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>
  <line x1="160" y1="290" x2="160" y2="328" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Roll-up door Bay 1 -->
  <rect x="78" y="370" width="90" height="80" fill="rgba(234,228,212,0.06)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <line x1="78" y1="390" x2="168" y2="390" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="78" y1="410" x2="168" y2="410" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="78" y1="430" x2="168" y2="430" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>

  <!-- ===== BAY 2 (center) ===== -->
  <!-- Shared column with bay 1 -->
  <rect x="241" y="210" width="8" height="240" fill="#1e2c3e" stroke="rgba(183,80,31,0.45)" stroke-width="1.2"/>
  <!-- Roof -->
  <polygon points="245,260 435,200 435,260 245,260" fill="#0e1620" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>
  <line x1="305" y1="244" x2="435" y2="200" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="365" y1="226" x2="435" y2="200" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="245" y1="260" x2="435" y2="200" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <!-- Back wall -->
  <rect x="245" y="260" width="190" height="190" fill="#121a26" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <!-- Windows Bay 2 (strip) -->
  <rect x="256" y="282" width="160" height="42" fill="rgba(183,80,31,0.1)" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <line x1="310" y1="282" x2="310" y2="324" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="364" y1="282" x2="364" y2="324" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <!-- Larger door Bay 2 (double) -->
  <rect x="256" y="365" width="160" height="85" fill="rgba(234,228,212,0.06)" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <line x1="336" y1="365" x2="336" y2="450" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="256" y1="385" x2="416" y2="385" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="256" y1="405" x2="416" y2="405" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="256" y1="425" x2="416" y2="425" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>

  <!-- ===== BAY 3 (rightmost) ===== -->
  <!-- Shared column -->
  <rect x="431" y="200" width="8" height="250" fill="#1e2c3e" stroke="rgba(183,80,31,0.45)" stroke-width="1.2"/>
  <!-- Roof -->
  <polygon points="435,260 625,212 625,260 435,260" fill="#101820" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>
  <line x1="495" y1="248" x2="625" y2="212" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="555" y1="232" x2="625" y2="212" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="435" y1="260" x2="625" y2="212" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <!-- Back wall -->
  <rect x="435" y="260" width="190" height="190" fill="#141c28" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <!-- Windows Bay 3 -->
  <rect x="450" y="290" width="50" height="38" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>
  <line x1="475" y1="290" x2="475" y2="328" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <rect x="515" y="290" width="50" height="38" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>
  <line x1="540" y1="290" x2="540" y2="328" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Roll-up door Bay 3 -->
  <rect x="452" y="370" width="90" height="80" fill="rgba(234,228,212,0.06)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <line x1="452" y1="390" x2="542" y2="390" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="452" y1="410" x2="542" y2="410" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="452" y1="430" x2="542" y2="430" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>

  <!-- Right end wall -->
  <rect x="621" y="212" width="30" height="238" fill="#161e2a" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>

  <!-- Office/admin section attached at right -->
  <rect x="648" y="285" width="108" height="165" fill="#1a2434" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <rect x="643" y="276" width="118" height="12" fill="#202e42" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <!-- Office windows -->
  <rect x="662" y="300" width="36" height="30" fill="rgba(183,80,31,0.15)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <line x1="680" y1="300" x2="680" y2="330" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <rect x="706" y="300" width="36" height="30" fill="rgba(183,80,31,0.15)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <line x1="724" y1="300" x2="724" y2="330" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <rect x="662" y="345" width="36" height="30" fill="rgba(183,80,31,0.15)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <rect x="706" y="345" width="36" height="30" fill="rgba(183,80,31,0.15)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <!-- Entrance -->
  <rect x="694" y="390" width="44" height="60" fill="rgba(234,228,212,0.08)" stroke="rgba(234,228,212,0.5)" stroke-width="1.2"/>

  <!-- Bay labels inside -->
  <text x="150" y="420" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.1)" text-anchor="middle">BAY 1</text>
  <text x="336" y="420" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.1)" text-anchor="middle">BAY 2</text>
  <text x="517" y="420" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.1)" text-anchor="middle">BAY 3</text>

  <!-- OSB road / access road -->
  <line x1="0" y1="472" x2="800" y2="472" stroke="rgba(183,80,31,0.1)" stroke-width="1" stroke-dasharray="20,10"/>

  <!-- Total width dimension -->
  <line x1="55" y1="548" x2="625" y2="548" stroke="rgba(183,80,31,0.45)" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="55" y1="542" x2="55" y2="554" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <line x1="625" y1="542" x2="625" y2="554" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <text x="340" y="568" font-family="monospace" font-size="11" fill="rgba(183,80,31,0.75)" text-anchor="middle" letter-spacing="0.08em">75.00 m · 3 AÇIKLIK</text>

  <!-- Label -->
  <rect x="16" y="16" width="6" height="6" fill="#B7501F"/>
  <text x="28" y="24" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.85)" letter-spacing="0.12em">ENDÜSTRİYEL · ÜRETİM</text>
  <text x="16" y="40" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.08em">2023-015 / KONYA OSB</text>

  <path d="M16 580 L16 564 L32 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <path d="M784 580 L784 564 L768 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
</svg>
