<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Denizli Otomotiv Yedek Parça Hangarı - Geniş açıklıklı çelik hangar yapısı">
  <title>Denizli Otomotiv Yedek Parça Hangarı</title>
  <defs>
    <pattern id="grid-ho" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="sky-ho" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#090d13"/>
      <stop offset="100%" stop-color="#141c26"/>
    </linearGradient>
    <linearGradient id="door-ho" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(234,228,212,0.08)"/>
      <stop offset="50%" stop-color="rgba(234,228,212,0.02)"/>
      <stop offset="100%" stop-color="rgba(234,228,212,0.08)"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky-ho)"/>
  <rect width="800" height="600" fill="url(#grid-ho)"/>

  <!-- Ground -->
  <rect x="0" y="470" width="800" height="130" fill="#0c1319"/>
  <line x1="0" y1="470" x2="800" y2="470" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <!-- Concrete pad -->
  <rect x="0" y="470" width="800" height="25" fill="#111920"/>
  <!-- Apron expansion joints -->
  <line x1="200" y1="470" x2="200" y2="495" stroke="rgba(234,228,212,0.06)" stroke-width="1.5"/>
  <line x1="400" y1="470" x2="400" y2="495" stroke="rgba(234,228,212,0.06)" stroke-width="1.5"/>
  <line x1="600" y1="470" x2="600" y2="495" stroke="rgba(234,228,212,0.06)" stroke-width="1.5"/>

  <!-- HANGAR — wide span, arch roof, large bifold doors -->
  <!-- Side walls -->
  <rect x="60" y="220" width="80" height="250" fill="#161e28" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <rect x="660" y="220" width="80" height="250" fill="#161e28" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>

  <!-- Arched roof -->
  <path d="M60 220 Q400 80 740 220" fill="#131b24" stroke="rgba(234,228,212,0.7)" stroke-width="2"/>
  <!-- Secondary arch line (inner) -->
  <path d="M80 230 Q400 100 720 230" fill="none" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <!-- Roof purlins -->
  <line x1="160" y1="177" x2="640" y2="177" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="120" y1="198" x2="680" y2="198" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <line x1="90" y1="216" x2="710" y2="216" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>

  <!-- Large bifold / sliding entrance doors (partially open) -->
  <!-- Door frame -->
  <rect x="140" y="220" width="520" height="250" fill="none" stroke="rgba(234,228,212,0.45)" stroke-width="2"/>
  <!-- Left door panel (folded back) -->
  <rect x="140" y="220" width="52" height="250" fill="#1a2434" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <!-- Door panel horizontal ribs -->
  <line x1="140" y1="260" x2="192" y2="260" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <line x1="140" y1="300" x2="192" y2="300" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <line x1="140" y1="340" x2="192" y2="340" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <line x1="140" y1="380" x2="192" y2="380" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <line x1="140" y1="420" x2="192" y2="420" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>

  <!-- Right door panel (folded back) -->
  <rect x="608" y="220" width="52" height="250" fill="#1a2434" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <line x1="608" y1="260" x2="660" y2="260" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <line x1="608" y1="300" x2="660" y2="300" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <line x1="608" y1="340" x2="660" y2="340" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <line x1="608" y1="380" x2="660" y2="380" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <line x1="608" y1="420" x2="660" y2="420" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>

  <!-- Interior visible through open doors -->
  <rect x="192" y="220" width="416" height="250" fill="url(#door-ho)"/>

  <!-- Interior: overhead crane rail -->
  <rect x="192" y="248" width="416" height="8" fill="rgba(234,228,212,0.12)" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <!-- Crane beam -->
  <rect x="280" y="248" width="200" height="14" fill="rgba(92,102,113,0.4)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <!-- Crane hoist -->
  <rect x="363" y="262" width="34" height="22" fill="rgba(183,80,31,0.3)" stroke="rgba(183,80,31,0.5)" stroke-width="1"/>
  <!-- Hook chain -->
  <line x1="380" y1="284" x2="380" y2="320" stroke="rgba(234,228,212,0.3)" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Vehicle silhouette (car) inside hangar -->
  <rect x="240" y="390" width="130" height="60" rx="4" fill="rgba(22,30,40,0.8)" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <rect x="260" y="375" width="90" height="18" rx="2" fill="rgba(22,30,40,0.7)" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <circle cx="270" cy="452" r="14" fill="#0d1218" stroke="rgba(234,228,212,0.3)" stroke-width="1.5"/>
  <circle cx="350" cy="452" r="14" fill="#0d1218" stroke="rgba(234,228,212,0.3)" stroke-width="1.5"/>

  <!-- Another vehicle (larger) -->
  <rect x="420" y="385" width="160" height="65" rx="3" fill="rgba(22,30,40,0.7)" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <circle cx="445" cy="453" r="16" fill="#0d1218" stroke="rgba(234,228,212,0.25)" stroke-width="1.5"/>
  <circle cx="555" cy="453" r="16" fill="#0d1218" stroke="rgba(234,228,212,0.25)" stroke-width="1.5"/>

  <!-- Floor line inside -->
  <line x1="192" y1="470" x2="608" y2="470" stroke="rgba(183,80,31,0.2)" stroke-width="1"/>

  <!-- Personnel door (side) -->
  <rect x="62" y="380" width="36" height="90" fill="rgba(234,228,212,0.08)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>

  <!-- Span dimension -->
  <line x1="140" y1="550" x2="660" y2="550" stroke="rgba(183,80,31,0.45)" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="140" y1="544" x2="140" y2="556" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <line x1="660" y1="544" x2="660" y2="556" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <text x="400" y="570" font-family="monospace" font-size="11" fill="rgba(183,80,31,0.75)" text-anchor="middle" letter-spacing="0.08em">52.00 m AÇIKLIK</text>

  <!-- Label -->
  <rect x="16" y="16" width="6" height="6" fill="#B7501F"/>
  <text x="28" y="24" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.85)" letter-spacing="0.12em">ENDÜSTRİYEL · HANGAR</text>
  <text x="16" y="40" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.08em">2023-018 / DENİZLİ</text>

  <path d="M16 580 L16 564 L32 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <path d="M784 580 L784 564 L768 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
</svg>
