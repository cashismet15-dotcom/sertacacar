<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Bodrum Prefabrik Villa Sitesi - Modern hafif çelik villa">
  <title>Bodrum Prefabrik Villa Sitesi</title>
  <defs>
    <pattern id="grid-vb" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="sky-vb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e131a"/>
      <stop offset="80%" stop-color="#19232e"/>
      <stop offset="100%" stop-color="#1e2d3d"/>
    </linearGradient>
    <linearGradient id="sea-vb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1e2e"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky-vb)"/>
  <rect width="800" height="600" fill="url(#grid-vb)"/>

  <!-- Sea / horizon -->
  <rect x="0" y="440" width="800" height="80" fill="url(#sea-vb)"/>
  <line x1="0" y1="440" x2="800" y2="440" stroke="rgba(183,80,31,0.15)" stroke-width="1"/>
  <!-- Sea surface shimmer -->
  <line x1="80" y1="455" x2="160" y2="455" stroke="rgba(234,228,212,0.07)" stroke-width="1.5"/>
  <line x1="300" y1="465" x2="420" y2="465" stroke="rgba(234,228,212,0.06)" stroke-width="1.5"/>
  <line x1="580" y1="450" x2="680" y2="450" stroke="rgba(234,228,212,0.07)" stroke-width="1.5"/>
  <line x1="200" y1="475" x2="280" y2="475" stroke="rgba(234,228,212,0.05)" stroke-width="1"/>
  <line x1="490" y1="470" x2="560" y2="470" stroke="rgba(234,228,212,0.05)" stroke-width="1"/>

  <!-- Ground / terrace -->
  <rect x="0" y="490" width="800" height="110" fill="#0d1219"/>
  <rect x="0" y="490" width="800" height="14" fill="#131a22"/>
  <line x1="0" y1="490" x2="800" y2="490" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>

  <!-- Hills / landscape background -->
  <ellipse cx="120" cy="380" rx="180" ry="120" fill="rgba(20,28,38,0.5)"/>
  <ellipse cx="680" cy="400" rx="160" ry="100" fill="rgba(20,28,38,0.4)"/>

  <!-- VILLA BUILDING — modern two-story prefab with horizontal design -->
  <!-- Ground floor -->
  <rect x="160" y="360" width="480" height="130" fill="#1a2430" stroke="rgba(234,228,212,0.65)" stroke-width="1.5"/>

  <!-- Flat roof with parapet -->
  <rect x="155" y="348" width="490" height="16" fill="#1e2c3c" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>

  <!-- Second floor (setback) -->
  <rect x="200" y="250" width="400" height="110" fill="#1d2b3a" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>

  <!-- Second floor flat roof with parapet -->
  <rect x="195" y="238" width="410" height="14" fill="#22303f" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>

  <!-- Roof deck terrace (second floor roof) -->
  <rect x="200" y="232" width="400" height="8" fill="#252d38" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <!-- Terrace railing -->
  <line x1="205" y1="230" x2="595" y2="230" stroke="rgba(234,228,212,0.45)" stroke-width="2"/>
  <line x1="205" y1="218" x2="205" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="255" y1="218" x2="255" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="305" y1="218" x2="305" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="355" y1="218" x2="355" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="405" y1="218" x2="405" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="455" y1="218" x2="455" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="505" y1="218" x2="505" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="555" y1="218" x2="555" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="595" y1="218" x2="595" y2="232" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <line x1="205" y1="218" x2="595" y2="218" stroke="rgba(234,228,212,0.45)" stroke-width="2"/>

  <!-- Ground floor: large panoramic windows -->
  <rect x="172" y="375" width="180" height="95" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.5)" stroke-width="1.2"/>
  <line x1="262" y1="375" x2="262" y2="470" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="172" y1="420" x2="352" y2="420" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Reflection -->
  <rect x="176" y="378" width="82" height="30" fill="rgba(234,228,212,0.04)"/>

  <!-- Ground floor: entrance / sliding door -->
  <rect x="375" y="380" width="110" height="110" fill="rgba(234,228,212,0.08)" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <line x1="430" y1="380" x2="430" y2="490" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <!-- Door frame top -->
  <rect x="375" y="378" width="110" height="6" fill="rgba(234,228,212,0.2)"/>

  <!-- Ground floor: right wing window -->
  <rect x="508" y="378" width="120" height="90" fill="rgba(183,80,31,0.12)" stroke="rgba(234,228,212,0.5)" stroke-width="1.2"/>
  <line x1="568" y1="378" x2="568" y2="468" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>

  <!-- Second floor: horizontal strip windows -->
  <rect x="215" y="270" width="370" height="55" fill="rgba(183,80,31,0.1)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <line x1="335" y1="270" x2="335" y2="325" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <line x1="455" y1="270" x2="455" y2="325" stroke="rgba(234,228,212,0.18)" stroke-width="1"/>
  <!-- Reflection in second floor windows -->
  <rect x="218" y="273" width="114" height="18" fill="rgba(234,228,212,0.04)"/>
  <rect x="338" y="273" width="114" height="18" fill="rgba(234,228,212,0.04)"/>

  <!-- Ground floor overhang / sunshade -->
  <rect x="158" y="343" width="490" height="10" fill="#222f3e" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>

  <!-- Landscape: trees (abstracted) -->
  <circle cx="100" cy="420" r="30" fill="rgba(15,22,30,0.7)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="97" y="420" width="6" height="70" fill="rgba(20,28,38,0.6)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <circle cx="700" cy="415" r="25" fill="rgba(15,22,30,0.7)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="697" y="415" width="6" height="75" fill="rgba(20,28,38,0.6)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>

  <!-- Terrace steps to garden -->
  <rect x="155" y="486" width="40" height="8" fill="#141c26" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <rect x="150" y="492" width="50" height="6" fill="#141c26" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>

  <!-- Height dimension -->
  <line x1="130" y1="238" x2="130" y2="490" stroke="rgba(183,80,31,0.4)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="124" y1="238" x2="136" y2="238" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <line x1="124" y1="490" x2="136" y2="490" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <text x="118" y="368" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.7)" text-anchor="middle" letter-spacing="0.06em" transform="rotate(-90 118 368)">8.50 m</text>

  <!-- Label -->
  <rect x="16" y="16" width="6" height="6" fill="#B7501F"/>
  <text x="28" y="24" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.85)" letter-spacing="0.12em">KONUT · PREFABRİK VİLLA</text>
  <text x="16" y="40" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.08em">2024-006 / BODRUM · MUĞLA</text>

  <path d="M16 580 L16 564 L32 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <path d="M784 580 L784 564 L768 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
</svg>
