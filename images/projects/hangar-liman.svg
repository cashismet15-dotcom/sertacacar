<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Mersin Liman Hangar Projesi - Liman alanında geniş açıklıklı çelik hangar">
  <title>Mersin Liman Hangar Projesi</title>
  <defs>
    <pattern id="grid-hl" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="sky-hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06090f"/>
      <stop offset="60%" stop-color="#0f1828"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="sea-hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1e35"/>
      <stop offset="100%" stop-color="#080f1a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky-hl)"/>
  <rect width="800" height="600" fill="url(#grid-hl)"/>

  <!-- Sea in foreground -->
  <rect x="0" y="500" width="800" height="100" fill="url(#sea-hl)"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="rgba(92,102,113,0.3)" stroke-width="1"/>
  <!-- Waves -->
  <path d="M0 515 Q80 510 160 516 Q240 522 320 515 Q400 508 480 515 Q560 522 640 516 Q720 510 800 514" fill="none" stroke="rgba(234,228,212,0.06)" stroke-width="1.5"/>
  <path d="M0 528 Q100 522 200 528 Q300 534 400 526 Q500 518 600 526 Q700 534 800 528" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>

  <!-- Port quay wall -->
  <rect x="0" y="486" width="800" height="16" fill="#141e2e" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Quay bollards -->
  <rect x="120" y="474" width="12" height="18" fill="#1a2640" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <rect x="280" y="474" width="12" height="18" fill="#1a2640" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <rect x="440" y="474" width="12" height="18" fill="#1a2640" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <rect x="600" y="474" width="12" height="18" fill="#1a2640" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>

  <!-- Ground / concrete apron -->
  <rect x="0" y="430" width="800" height="58" fill="#101820"/>
  <line x1="0" y1="430" x2="800" y2="430" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <!-- Rail tracks -->
  <line x1="0" y1="455" x2="800" y2="455" stroke="rgba(92,102,113,0.35)" stroke-width="2"/>
  <line x1="0" y1="462" x2="800" y2="462" stroke="rgba(92,102,113,0.35)" stroke-width="2"/>
  <!-- Rail ties -->
  <line x1="100" y1="452" x2="100" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="140" y1="452" x2="140" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="180" y1="452" x2="180" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="220" y1="452" x2="220" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="260" y1="452" x2="260" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="300" y1="452" x2="300" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="340" y1="452" x2="340" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="380" y1="452" x2="380" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="420" y1="452" x2="420" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="460" y1="452" x2="460" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="500" y1="452" x2="500" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="540" y1="452" x2="540" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="580" y1="452" x2="580" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="620" y1="452" x2="620" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="660" y1="452" x2="660" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>
  <line x1="700" y1="452" x2="700" y2="466" stroke="rgba(92,102,113,0.2)" stroke-width="3"/>

  <!-- HANGAR BUILDING — massive port hangar -->
  <!-- Side walls (heavy industrial) -->
  <rect x="50" y="160" width="40" height="270" fill="#161e2e" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <rect x="710" y="160" width="40" height="270" fill="#161e2e" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>

  <!-- Roof — portal frame gabled roof -->
  <path d="M50 160 L400 80 L750 160" fill="#111928" stroke="rgba(234,228,212,0.7)" stroke-width="2"/>
  <!-- Inner roof line -->
  <path d="M70 168 L400 92 L730 168" fill="none" stroke="rgba(234,228,212,0.14)" stroke-width="1"/>
  <!-- Roof purlins -->
  <line x1="120" y1="151" x2="400" y2="88" stroke="rgba(234,228,212,0.09)" stroke-width="1"/>
  <line x1="200" y1="135" x2="400" y2="88" stroke="rgba(234,228,212,0.09)" stroke-width="1"/>
  <line x1="280" y1="115" x2="400" y2="88" stroke="rgba(234,228,212,0.09)" stroke-width="1"/>
  <line x1="520" y1="115" x2="400" y2="88" stroke="rgba(234,228,212,0.09)" stroke-width="1"/>
  <line x1="600" y1="135" x2="400" y2="88" stroke="rgba(234,228,212,0.09)" stroke-width="1"/>
  <line x1="680" y1="151" x2="400" y2="88" stroke="rgba(234,228,212,0.09)" stroke-width="1"/>

  <!-- Massive sliding doors (partially open for entry) -->
  <!-- Left door panel -->
  <rect x="90" y="160" width="120" height="270" fill="#1a2840" stroke="rgba(234,228,212,0.4)" stroke-width="1.2"/>
  <!-- Door ribs -->
  <line x1="90" y1="210" x2="210" y2="210" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="90" y1="260" x2="210" y2="260" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="90" y1="310" x2="210" y2="310" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="90" y1="360" x2="210" y2="360" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <!-- Door wheel rail -->
  <rect x="90" y="425" width="300" height="8" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>

  <!-- Right door panel -->
  <rect x="590" y="160" width="120" height="270" fill="#1a2840" stroke="rgba(234,228,212,0.4)" stroke-width="1.2"/>
  <line x1="590" y1="210" x2="710" y2="210" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="590" y1="260" x2="710" y2="260" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="590" y1="310" x2="710" y2="310" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="590" y1="360" x2="710" y2="360" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <rect x="410" y="425" width="300" height="8" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>

  <!-- Opening between doors -->
  <rect x="210" y="160" width="380" height="270" fill="rgba(234,228,212,0.02)"/>

  <!-- Interior overhead crane (visible through opening) -->
  <!-- Crane gantry beam -->
  <rect x="210" y="188" width="380" height="10" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <!-- Crane end trucks -->
  <rect x="206" y="182" width="28" height="22" fill="rgba(183,80,31,0.3)" stroke="rgba(183,80,31,0.5)" stroke-width="1"/>
  <rect x="566" y="182" width="28" height="22" fill="rgba(183,80,31,0.3)" stroke="rgba(183,80,31,0.5)" stroke-width="1"/>
  <!-- Crane hoist unit -->
  <rect x="380" y="186" width="50" height="22" fill="rgba(183,80,31,0.25)" stroke="rgba(183,80,31,0.45)" stroke-width="1"/>
  <!-- Chain/wire rope -->
  <line x1="405" y1="208" x2="405" y2="270" stroke="rgba(234,228,212,0.2)" stroke-width="1.5" stroke-dasharray="3,3"/>
  <!-- Hook -->
  <path d="M400 270 Q405 282 410 274" fill="none" stroke="rgba(183,80,31,0.5)" stroke-width="2"/>

  <!-- Ship / vessel silhouette visible in background -->
  <!-- Hull -->
  <path d="M0 470 L30 440 L200 440 L220 470" fill="#0d1828" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Superstructure -->
  <rect x="80" y="390" width="80" height="52" fill="#111e30" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <rect x="88" y="375" width="64" height="18" fill="#111e30" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>

  <!-- Flagpole / Port crane mast in background (right) -->
  <line x1="720" y1="60" x2="720" y2="430" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>
  <line x1="720" y1="120" x2="760" y2="160" stroke="rgba(234,228,212,0.15)" stroke-width="1.5"/>
  <line x1="720" y1="160" x2="760" y2="200" stroke="rgba(234,228,212,0.12)" stroke-width="1.5"/>
  <circle cx="760" cy="160" r="6" fill="rgba(183,80,31,0.4)" stroke="rgba(183,80,31,0.6)" stroke-width="1"/>

  <!-- Port lights -->
  <circle cx="90" cy="156" r="4" fill="rgba(183,80,31,0.6)"/>
  <circle cx="710" cy="156" r="4" fill="rgba(183,80,31,0.6)"/>

  <!-- Dimension / span -->
  <line x1="90" y1="548" x2="710" y2="548" stroke="rgba(183,80,31,0.45)" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="90" y1="542" x2="90" y2="554" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <line x1="710" y1="542" x2="710" y2="554" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <text x="400" y="568" font-family="monospace" font-size="11" fill="rgba(183,80,31,0.75)" text-anchor="middle" letter-spacing="0.08em">92.00 m AÇIKLIK</text>

  <!-- Label -->
  <rect x="16" y="16" width="6" height="6" fill="#B7501F"/>
  <text x="28" y="24" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.85)" letter-spacing="0.12em">LOJİSTİK · LİMAN HANGARI</text>
  <text x="16" y="40" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.08em">2024-011 / MERSİN</text>

  <path d="M16 580 L16 564 L32 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <path d="M784 580 L784 564 L768 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
</svg>
