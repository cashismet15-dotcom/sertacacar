<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Bursa Gıda İşleme Tesisi - Hijyenik tasarımlı çelik üretim binası">
  <title>Bursa Gıda İşleme Tesisi</title>
  <defs>
    <pattern id="grid-fg" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="sky-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1017"/>
      <stop offset="100%" stop-color="#161e28"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky-fg)"/>
  <rect width="800" height="600" fill="url(#grid-fg)"/>

  <!-- Ground -->
  <rect x="0" y="468" width="800" height="132" fill="#0c1219"/>
  <line x1="0" y1="468" x2="800" y2="468" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="0" y="468" width="800" height="20" fill="#111920"/>

  <!-- Main building - barrel vault / curved roof (food processing characteristic) -->
  <!-- Side walls -->
  <rect x="80" y="290" width="640" height="178" fill="#161e28" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>

  <!-- Curved roof -->
  <path d="M80 290 Q400 160 720 290" fill="#131b24" stroke="rgba(234,228,212,0.7)" stroke-width="2"/>
  <!-- Inner curve -->
  <path d="M100 298 Q400 175 700 298" fill="none" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Roof insulation panels -->
  <line x1="160" y1="245" x2="160" y2="294" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="240" y1="222" x2="240" y2="290" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="320" y1="208" x2="320" y2="288" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="400" y1="200" x2="400" y2="290" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="480" y1="208" x2="480" y2="288" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="560" y1="222" x2="560" y2="290" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="640" y1="245" x2="640" y2="294" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>

  <!-- Roof ventilation / extraction units -->
  <rect x="270" y="168" width="50" height="30" fill="#1a2434" stroke="rgba(234,228,212,0.45)" stroke-width="1"/>
  <rect x="275" y="158" width="40" height="12" fill="#1e2a38" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>
  <!-- Ventilation grille -->
  <line x1="279" y1="168" x2="279" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="287" y1="168" x2="287" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="295" y1="168" x2="295" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="303" y1="168" x2="303" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="311" y1="168" x2="311" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>

  <rect x="480" y="168" width="50" height="30" fill="#1a2434" stroke="rgba(234,228,212,0.45)" stroke-width="1"/>
  <rect x="485" y="158" width="40" height="12" fill="#1e2a38" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>
  <line x1="489" y1="168" x2="489" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="497" y1="168" x2="497" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="505" y1="168" x2="505" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="513" y1="168" x2="513" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="521" y1="168" x2="521" y2="198" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>

  <!-- Smooth white/hygienic wall panels (food facility characteristic) -->
  <!-- Panel joints (horizontal) -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <line x1="80" y1="410" x2="720" y2="410" stroke="rgba(234,228,212,0.12)" stroke-width="1"/>
  <!-- Panel joints (vertical) -->
  <line x1="200" y1="290" x2="200" y2="468" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="320" y1="290" x2="320" y2="468" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="440" y1="290" x2="440" y2="468" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="560" y1="290" x2="560" y2="468" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <line x1="680" y1="290" x2="680" y2="468" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>

  <!-- Admin / office annex (attached to main building) -->
  <rect x="560" y="330" width="160" height="138" fill="#1a2434" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <rect x="555" y="320" width="170" height="14" fill="#1e2a38" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <!-- Annex windows -->
  <rect x="572" y="345" width="44" height="36" fill="rgba(183,80,31,0.15)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <line x1="594" y1="345" x2="594" y2="381" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <rect x="626" y="345" width="44" height="36" fill="rgba(183,80,31,0.15)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <line x1="648" y1="345" x2="648" y2="381" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <!-- Annex windows row 2 -->
  <rect x="572" y="395" width="44" height="36" fill="rgba(183,80,31,0.15)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <rect x="626" y="395" width="44" height="36" fill="rgba(183,80,31,0.15)" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <!-- Annex entrance -->
  <rect x="676" y="416" width="36" height="52" fill="rgba(234,228,212,0.1)" stroke="rgba(234,228,212,0.5)" stroke-width="1.2"/>

  <!-- Hygienic loading bay with sealed door -->
  <rect x="95" y="368" width="100" height="100" fill="rgba(234,228,212,0.06)" stroke="rgba(234,228,212,0.5)" stroke-width="1.5"/>
  <rect x="95" y="368" width="100" height="20" fill="#1e2a38" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <!-- Hygienic sealed dock -->
  <rect x="99" y="392" width="92" height="76" fill="rgba(234,228,212,0.04)" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <rect x="95" y="462" width="100" height="6" fill="rgba(183,80,31,0.35)" stroke="rgba(183,80,31,0.5)" stroke-width="1"/>

  <!-- Production door -->
  <rect x="225" y="390" width="80" height="78" fill="rgba(234,228,212,0.06)" stroke="rgba(234,228,212,0.45)" stroke-width="1.2"/>
  <line x1="265" y1="390" x2="265" y2="468" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>

  <!-- Pressure / hygiene sign -->
  <rect x="340" y="300" width="120" height="22" fill="rgba(183,80,31,0.15)" stroke="rgba(183,80,31,0.4)" stroke-width="1"/>
  <text x="400" y="315" font-family="monospace" font-size="9" fill="rgba(183,80,31,0.8)" text-anchor="middle" letter-spacing="0.1em">HİJYEN BÖLGE</text>

  <!-- Dimension line -->
  <line x1="80" y1="548" x2="720" y2="548" stroke="rgba(183,80,31,0.45)" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="80" y1="542" x2="80" y2="554" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <line x1="720" y1="542" x2="720" y2="554" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <text x="400" y="568" font-family="monospace" font-size="11" fill="rgba(183,80,31,0.75)" text-anchor="middle" letter-spacing="0.08em">68.00 m</text>

  <!-- Label -->
  <rect x="16" y="16" width="6" height="6" fill="#B7501F"/>
  <text x="28" y="24" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.85)" letter-spacing="0.12em">ENDÜSTRİYEL · GIDA TESİSİ</text>
  <text x="16" y="40" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.08em">2023-022 / BURSA</text>

  <path d="M16 580 L16 564 L32 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <path d="M784 580 L784 564 L768 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
</svg>
