<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Çeşme Butik Otel Prefabrik Yapısı - Deniz manzaralı modüler prefabrik otel binası">
  <title>Çeşme Butik Otel Prefabrik Yapısı</title>
  <defs>
