<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="İstanbul Ataşehir Showroom - Cam ve çelik modern ticari yapı">
  <title>İstanbul Ataşehir Showroom Çelik Yapı</title>
  <defs>
    <pattern id="grid-si" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="sky-si" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1118"/>
      <stop offset="100%" stop-color="#18222e"/>
    </linearGradient>
    <linearGradient id="glass-si" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(183,80,31,0.14)"/>
      <stop offset="50%" stop-color="rgba(183,80,31,0.06)"/>
      <stop offset="100%" stop-color="rgba(183,80,31,0.12)"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky-si)"/>
  <rect width="800" height="600" fill="url(#grid-si)"/>

  <!-- Urban buildings background -->
  <rect x="0" y="250" width="80" height="220" fill="rgba(16,22,32,0.6)" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <rect x="0" y="220" width="60" height="30" fill="rgba(16,22,32,0.5)"/>
  <rect x="680" y="260" width="80" height="210" fill="rgba(16,22,32,0.6)" stroke="rgba(234,228,212,0.08)" stroke-width="1"/>
  <rect x="690" y="230" width="60" height="32" fill="rgba(16,22,32,0.5)"/>
  <!-- Background building windows -->
  <rect x="10" y="260" width="12" height="15" fill="rgba(183,80,31,0.08)"/>
  <rect x="30" y="260" width="12" height="15" fill="rgba(183,80,31,0.08)"/>
  <rect x="10" y="285" width="12" height="15" fill="rgba(183,80,31,0.08)"/>
  <rect x="30" y="285" width="12" height="15" fill="rgba(183,80,31,0.08)"/>
  <rect x="692" y="268" width="12" height="15" fill="rgba(183,80,31,0.08)"/>
  <rect x="712" y="268" width="12" height="15" fill="rgba(183,80,31,0.08)"/>
  <rect x="692" y="293" width="12" height="15" fill="rgba(183,80,31,0.08)"/>
  <rect x="712" y="293" width="12" height="15" fill="rgba(183,80,31,0.08)"/>

  <!-- Ground / pavement -->
  <rect x="0" y="470" width="800" height="130" fill="#0d1520"/>
  <line x1="0" y1="470" x2="800" y2="470" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <!-- Polished concrete pavement -->
  <rect x="0" y="470" width="800" height="24" fill="#111e28"/>
  <line x1="0" y1="486" x2="800" y2="486" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>

  <!-- SHOWROOM BUILDING — glass curtain wall + steel frame exposed -->
  <!-- Steel frame structure (exposed) -->
  <!-- Columns -->
  <rect x="100" y="190" width="18" height="280" fill="#1e2c3e" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <rect x="245" y="190" width="18" height="280" fill="#1e2c3e" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <rect x="390" y="190" width="18" height="280" fill="#1e2c3e" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <rect x="535" y="190" width="18" height="280" fill="#1e2c3e" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>
  <rect x="680" y="190" width="18" height="280" fill="#1e2c3e" stroke="rgba(234,228,212,0.55)" stroke-width="1.5"/>

  <!-- Floor beams (horizontal structure) -->
  <!-- Level 3 -->
  <rect x="100" y="188" width="598" height="10" fill="#252f42" stroke="rgba(234,228,212,0.5)" stroke-width="1.2"/>
  <!-- Level 2 -->
  <rect x="100" y="310" width="598" height="10" fill="#252f42" stroke="rgba(234,228,212,0.5)" stroke-width="1.2"/>
  <!-- Level 1 (ground floor beam) -->
  <rect x="100" y="462" width="598" height="10" fill="#252f42" stroke="rgba(234,228,212,0.5)" stroke-width="1.2"/>

  <!-- Roof canopy / overhang -->
  <rect x="85" y="175" width="630" height="16" fill="#1a2840" stroke="rgba(234,228,212,0.6)" stroke-width="1.5"/>
  <!-- Canopy overhang -->
  <rect x="80" y="168" width="640" height="10" fill="#1e2c3e" stroke="rgba(234,228,212,0.4)" stroke-width="1"/>
  <!-- Canopy soffit detail -->
  <line x1="100" y1="168" x2="100" y2="178" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <line x1="245" y1="168" x2="245" y2="178" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <line x1="390" y1="168" x2="390" y2="178" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <line x1="535" y1="168" x2="535" y2="178" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <line x1="680" y1="168" x2="680" y2="178" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>

  <!-- GLASS PANELS — curtain wall (bay 1) -->
  <rect x="118" y="198" width="127" height="112" fill="url(#glass-si)" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <!-- Glass mullion -->
  <line x1="181" y1="198" x2="181" y2="310" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="118" y1="254" x2="245" y2="254" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <!-- Reflection in glass -->
  <polygon points="122,202 180,202 122,260" fill="rgba(234,228,212,0.04)"/>

  <!-- Glass panels bay 2 -->
  <rect x="263" y="198" width="127" height="112" fill="url(#glass-si)" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <line x1="326" y1="198" x2="326" y2="310" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="263" y1="254" x2="390" y2="254" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <polygon points="267,202 325,202 267,260" fill="rgba(234,228,212,0.04)"/>

  <!-- Glass panels bay 3 -->
  <rect x="408" y="198" width="127" height="112" fill="url(#glass-si)" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <line x1="471" y1="198" x2="471" y2="310" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="408" y1="254" x2="535" y2="254" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <polygon points="412,202 470,202 412,260" fill="rgba(234,228,212,0.04)"/>

  <!-- Glass panels bay 4 -->
  <rect x="553" y="198" width="127" height="112" fill="url(#glass-si)" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <line x1="616" y1="198" x2="616" y2="310" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="553" y1="254" x2="680" y2="254" stroke="rgba(234,228,212,0.15)" stroke-width="1"/>
  <polygon points="557,202 615,202 557,260" fill="rgba(234,228,212,0.04)"/>

  <!-- GROUND FLOOR — large display windows + entrance -->
  <!-- Bay 1 display window -->
  <rect x="118" y="320" width="127" height="142" fill="url(#glass-si)" stroke="rgba(234,228,212,0.35)" stroke-width="1.2"/>
  <line x1="181" y1="320" x2="181" y2="462" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <!-- Display items silhouette -->
  <rect x="128" y="400" width="50" height="55" fill="rgba(234,228,212,0.05)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="183" y="410" width="48" height="45" fill="rgba(234,228,212,0.04)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>

  <!-- Bay 2 entrance -->
  <rect x="263" y="320" width="127" height="142" fill="rgba(234,228,212,0.04)" stroke="rgba(234,228,212,0.4)" stroke-width="1.2"/>
  <!-- Sliding door -->
  <line x1="326" y1="320" x2="326" y2="462" stroke="rgba(234,228,212,0.35)" stroke-width="1.5"/>
  <rect x="268" y="322" width="8" height="138" fill="rgba(234,228,212,0.1)"/>
  <rect x="380" y="322" width="8" height="138" fill="rgba(234,228,212,0.1)"/>
  <!-- Entrance canopy small -->
  <rect x="258" y="315" width="138" height="8" fill="#252f42" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>

  <!-- Bay 3 display window -->
  <rect x="408" y="320" width="127" height="142" fill="url(#glass-si)" stroke="rgba(234,228,212,0.35)" stroke-width="1.2"/>
  <line x1="471" y1="320" x2="471" y2="462" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <!-- Display items -->
  <rect x="418" y="395" width="44" height="60" fill="rgba(234,228,212,0.05)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>
  <rect x="466" y="405" width="56" height="50" fill="rgba(234,228,212,0.04)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>

  <!-- Bay 4 display -->
  <rect x="553" y="320" width="127" height="142" fill="url(#glass-si)" stroke="rgba(234,228,212,0.35)" stroke-width="1.2"/>
  <line x1="616" y1="320" x2="616" y2="462" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <rect x="563" y="410" width="100" height="45" fill="rgba(234,228,212,0.04)" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>

  <!-- Signage on facade -->
  <rect x="200" y="140" width="400" height="30" fill="rgba(183,80,31,0.12)" stroke="rgba(183,80,31,0.35)" stroke-width="1"/>
  <text x="400" y="161" font-family="monospace" font-size="12" fill="rgba(183,80,31,0.7)" text-anchor="middle" letter-spacing="0.2em">SHOWROOM</text>

  <!-- Ground floor reflection / puddle -->
  <ellipse cx="400" cy="476" rx="220" ry="8" fill="rgba(183,80,31,0.05)"/>

  <!-- Dimension -->
  <line x1="100" y1="548" x2="698" y2="548" stroke="rgba(183,80,31,0.45)" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="100" y1="542" x2="100" y2="554" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <line x1="698" y1="542" x2="698" y2="554" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <text x="399" y="568" font-family="monospace" font-size="11" fill="rgba(183,80,31,0.75)" text-anchor="middle" letter-spacing="0.08em">60.00 m</text>

  <!-- Label -->
  <rect x="16" y="16" width="6" height="6" fill="#B7501F"/>
  <text x="28" y="24" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.85)" letter-spacing="0.12em">TİCARİ · SHOWROOM</text>
  <text x="16" y="40" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.08em">2023-040 / İSTANBUL ATAŞEHİR</text>

  <path d="M16 580 L16 564 L32 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <path d="M784 580 L784 564 L768 564" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
</svg>
