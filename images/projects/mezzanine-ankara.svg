<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Ankara Endüstri Mezzanine Sistemi - Çelik ara kat ve depolama sistemi kesiti">
  <title>Ankara Endüstri Mezzanine Sistemi</title>
  <defs>
    <pattern id="grid-ma" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(234,228,212,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg-ma" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f16"/>
      <stop offset="100%" stop-color="#131c28"/>
    </linearGradient>
    <linearGradient id="interior-ma" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151e2c"/>
      <stop offset="100%" stop-color="#0f1820"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg-ma)"/>
  <rect width="800" height="600" fill="url(#grid-ma)"/>

  <!-- This is a cross-section / interior view of a mezzanine system -->
  <!-- Section cut title -->
  <text x="400" y="38" font-family="monospace" font-size="11" fill="rgba(234,228,212,0.3)" text-anchor="middle" letter-spacing="0.18em">KESİT / A-A / M:1:100</text>
  <line x1="80" y1="44" x2="720" y2="44" stroke="rgba(234,228,212,0.1)" stroke-width="1"/>

  <!-- Outer building shell -->
  <rect x="60" y="60" width="680" height="480" fill="url(#interior-ma)" stroke="rgba(234,228,212,0.45)" stroke-width="2"/>

  <!-- Roof structure -->
  <rect x="60" y="60" width="680" height="20" fill="#1e2a38" stroke="rgba(234,228,212,0.45)" stroke-width="1.5"/>
  <!-- Roof purlins visible from inside -->
  <line x1="180" y1="60" x2="180" y2="80" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <line x1="300" y1="60" x2="300" y2="80" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <line x1="420" y1="60" x2="420" y2="80" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <line x1="540" y1="60" x2="540" y2="80" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <line x1="660" y1="60" x2="660" y2="80" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <!-- Overhead crane rail (suspended) -->
  <rect x="60" y="95" width="680" height="10" fill="#252f3e" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <!-- Crane trolley -->
  <rect x="380" y="87" width="60" height="18" fill="#2a3748" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>
  <line x1="410" y1="105" x2="410" y2="145" stroke="rgba(234,228,212,0.25)" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Hook -->
  <path d="M405 145 Q410 155 415 148" fill="none" stroke="rgba(183,80,31,0.6)" stroke-width="2"/>

  <!-- MAIN COLUMNS (supporting mezzanine and roof) -->
  <!-- Column A (left) -->
  <rect x="115" y="80" width="20" height="460" fill="#1e2c3e" stroke="rgba(183,80,31,0.55)" stroke-width="1.5"/>
  <!-- Column B (left-center) -->
  <rect x="310" y="80" width="20" height="460" fill="#1e2c3e" stroke="rgba(183,80,31,0.55)" stroke-width="1.5"/>
  <!-- Column C (right-center) -->
  <rect x="475" y="80" width="20" height="460" fill="#1e2c3e" stroke="rgba(183,80,31,0.55)" stroke-width="1.5"/>
  <!-- Column D (right) -->
  <rect x="670" y="80" width="20" height="460" fill="#1e2c3e" stroke="rgba(183,80,31,0.55)" stroke-width="1.5"/>

  <!-- MEZZANINE LEVEL -->
  <!-- Mezzanine deck plate -->
  <rect x="115" y="292" width="395" height="20" fill="#1e2c3e" stroke="rgba(234,228,212,0.7)" stroke-width="2"/>
  <!-- Mezzanine secondary beams (visible from below) -->
  <line x1="175" y1="292" x2="175" y2="312" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <line x1="235" y1="292" x2="235" y2="312" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <line x1="295" y1="292" x2="295" y2="312" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <line x1="370" y1="292" x2="370" y2="312" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <line x1="430" y1="292" x2="430" y2="312" stroke="rgba(234,228,212,0.2)" stroke-width="3"/>
  <!-- Mezzanine railing -->
  <line x1="115" y1="288" x2="510" y2="288" stroke="rgba(234,228,212,0.6)" stroke-width="2"/>
  <line x1="125" y1="258" x2="125" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="165" y1="258" x2="165" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="205" y1="258" x2="205" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="245" y1="258" x2="245" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="285" y1="258" x2="285" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="335" y1="258" x2="335" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="375" y1="258" x2="375" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="415" y1="258" x2="415" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="455" y1="258" x2="455" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="498" y1="258" x2="498" y2="290" stroke="rgba(234,228,212,0.4)" stroke-width="1.5"/>
  <line x1="125" y1="258" x2="498" y2="258" stroke="rgba(234,228,212,0.6)" stroke-width="2"/>

  <!-- STAIRCASE (connection between floors) -->
  <rect x="510" y="260" width="22" height="52" fill="#1a2434" stroke="rgba(183,80,31,0.5)" stroke-width="1.2"/>
  <!-- Stair treads -->
  <line x1="510" y1="270" x2="532" y2="270" stroke="rgba(234,228,212,0.35)" stroke-width="2"/>
  <line x1="510" y1="280" x2="532" y2="280" stroke="rgba(234,228,212,0.35)" stroke-width="2"/>
  <line x1="510" y1="290" x2="532" y2="290" stroke="rgba(234,228,212,0.35)" stroke-width="2"/>
  <line x1="510" y1="300" x2="532" y2="300" stroke="rgba(234,228,212,0.35)" stroke-width="2"/>
  <!-- Landing -->
  <rect x="510" y="312" width="22" height="14" fill="#1e2c3e" stroke="rgba(234,228,212,0.35)" stroke-width="1"/>

  <!-- GROUND FLOOR STORAGE / OPERATION AREA -->
  <!-- Forklift silhouette on ground floor -->
  <rect x="140" y="430" width="70" height="40" rx="2" fill="#1a2434" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <rect x="132" y="400" width="16" height="80" fill="#1a2434" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="132" y1="432" x2="148" y2="432" stroke="rgba(183,80,31,0.5)" stroke-width="4"/>
  <line x1="132" y1="448" x2="148" y2="448" stroke="rgba(183,80,31,0.5)" stroke-width="4"/>
  <circle cx="152" cy="470" r="10" fill="#0d1218" stroke="rgba(234,228,212,0.3)" stroke-width="1.5"/>
  <circle cx="196" cy="470" r="10" fill="#0d1218" stroke="rgba(234,228,212,0.3)" stroke-width="1.5"/>

  <!-- Storage racks on mezzanine level -->
  <!-- Rack 1 -->
  <rect x="130" y="220" width="20" height="70" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <rect x="160" y="220" width="20" height="70" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <line x1="130" y1="238" x2="180" y2="238" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>
  <line x1="130" y1="256" x2="180" y2="256" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>
  <!-- Rack 2 -->
  <rect x="210" y="212" width="20" height="78" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <rect x="240" y="212" width="20" height="78" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <line x1="210" y1="232" x2="260" y2="232" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>
  <line x1="210" y1="252" x2="260" y2="252" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>
  <!-- Rack 3 -->
  <rect x="370" y="215" width="20" height="75" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <rect x="400" y="215" width="20" height="75" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <line x1="370" y1="234" x2="420" y2="234" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>
  <line x1="370" y1="253" x2="420" y2="253" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>
  <!-- Rack 4 -->
  <rect x="450" y="220" width="20" height="70" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <rect x="480" y="220" width="20" height="70" fill="rgba(92,102,113,0.3)" stroke="rgba(234,228,212,0.25)" stroke-width="1"/>
  <line x1="450" y1="240" x2="500" y2="240" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>
  <line x1="450" y1="258" x2="500" y2="258" stroke="rgba(234,228,212,0.2)" stroke-width="2"/>

  <!-- Ground floor storage racks (large) -->
  <rect x="545" y="330" width="30" height="200" fill="rgba(92,102,113,0.25)" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <rect x="595" y="330" width="30" height="200" fill="rgba(92,102,113,0.25)" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <rect x="645" y="330" width="30" height="200" fill="rgba(92,102,113,0.25)" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <line x1="545" y1="380" x2="675" y2="380" stroke="rgba(234,228,212,0.18)" stroke-width="2"/>
  <line x1="545" y1="430" x2="675" y2="430" stroke="rgba(234,228,212,0.18)" stroke-width="2"/>
  <line x1="545" y1="480" x2="675" y2="480" stroke="rgba(234,228,212,0.18)" stroke-width="2"/>

  <!-- Dimension annotations -->
  <!-- Floor-to-mezzanine height -->
  <line x1="76" y1="312" x2="76" y2="540" stroke="rgba(183,80,31,0.4)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="312" x2="82" y2="312" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <line x1="70" y1="540" x2="82" y2="540" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <text x="68" y="430" font-family="monospace" font-size="9" fill="rgba(183,80,31,0.65)" text-anchor="middle" transform="rotate(-90 68 430)">4.80 m</text>

  <!-- Mezzanine-to-roof height -->
  <line x1="76" y1="80" x2="76" y2="292" stroke="rgba(183,80,31,0.4)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="80" x2="82" y2="80" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <line x1="70" y1="292" x2="82" y2="292" stroke="rgba(183,80,31,0.5)" stroke-width="1.5"/>
  <text x="68" y="190" font-family="monospace" font-size="9" fill="rgba(183,80,31,0.65)" text-anchor="middle" transform="rotate(-90 68 190)">6.40 m</text>

  <!-- Ground floor -->
  <rect x="60" y="540" width="680" height="10" fill="#252f3e" stroke="rgba(234,228,212,0.3)" stroke-width="1"/>
  <!-- Floor level label -->
  <text x="740" y="548" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.06em">±0.00</text>
  <text x="740" y="300" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.06em">+4.80</text>

  <!-- Label -->
  <rect x="16" y="56" width="6" height="6" fill="#B7501F"/>
  <text x="28" y="64" font-family="monospace" font-size="10" fill="rgba(183,80,31,0.85)" letter-spacing="0.12em">MEZZANİNE · ARA KAT</text>
  <text x="16" y="80" font-family="monospace" font-size="9" fill="rgba(234,228,212,0.3)" letter-spacing="0.08em">2024-002 / ANKARA</text>

  <path d="M16 590 L16 574 L32 574" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
  <path d="M784 590 L784 574 L768 574" fill="none" stroke="rgba(234,228,212,0.2)" stroke-width="1"/>
</svg>
